name: Job Alert System

on:
  schedule:
    - cron: "0 0 */2 * *"   # Every 2 days at 8:00 AM Singapore time (UTC+8 = 00:00 UTC)
  workflow_dispatch:          # Allow manual "Run workflow" button in GitHub UI

permissions:
  contents: write        # needed to push sent_jobs.json back to repo

jobs:
  run-job-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Alert System
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          RESUME_PROFILE: ${{ secrets.RESUME_PROFILE }}
          TRACKER_SHEET_ID: ${{ secrets.TRACKER_SHEET_ID }}
        run: python main.py

      - name: Persist sent_jobs.json for dedup tracking
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_jobs.json || true
          git diff --cached --quiet || git commit -m "chore: update sent_jobs.json [skip ci]"
          git push || true
