name: Weekly Job Market Digest

on:
  schedule:
    - cron: "0 2 * * 0"   # Every Sunday at 10:00 AM Singapore time (UTC+8 = 02:00 UTC)
  workflow_dispatch:        # Allow manual "Run workflow" button in GitHub UI

jobs:
  run-weekly-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Weekly Digest
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          RESUME_PROFILE: ${{ secrets.RESUME_PROFILE }}
        run: python weekly_digest.py
